name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Check for vulnerable packages
        shell: bash
        run: |
          set -euo pipefail
          # Fail-CLOSED: pipefail makes a scanner failure (network / restore / advisory-DB
          # fetch) fail the step too, not just a real advisory. Policy: block on High/Critical;
          # Moderate/Low are printed but non-blocking. Queries the live NuGet advisory DB, so a
          # newly-published advisory can flag an otherwise-unchanged pin.
          dotnet list package --vulnerable --include-transitive | tee vuln.log
          if grep -qiE '\b(critical|high)\b' vuln.log; then
            echo "::error::High/Critical vulnerable package(s) detected"; exit 1
          fi

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage"
